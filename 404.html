<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Page Not Found · Laura &amp; William</title>
<meta name="robots" content="noindex" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Cinzel:wght@500&family=Inter:wght@400&display=swap" rel="stylesheet" />
<style>
  *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: #0a0807; color: #ebe2c8;
    font-family: 'Cormorant Garamond', Georgia, serif;
    padding: 24px; text-align: center;
  }
  .wrap { max-width: 520px; }
  .seal {
    width: 64px; height: 64px; line-height: 64px;
    margin: 0 auto 32px;
    border: 0.5px solid #b89968; border-radius: 50%;
    font-family: 'Cinzel', serif; font-size: 22px;
    color: #d4b87c;
  }
  .num {
    font-family: 'Cinzel', serif; font-size: 14px;
    letter-spacing: 0.5em; text-transform: uppercase;
    color: #d4b87c; margin-bottom: 18px;
  }
  h1 {
    font-family: 'Cinzel', serif; font-weight: 500;
    font-size: clamp(28px, 5vw, 44px);
    letter-spacing: 0.12em; text-transform: uppercase;
    margin-bottom: 22px;
  }
  p {
    font-style: italic; font-size: 19px; line-height: 1.7;
    color: rgba(235, 226, 200, 0.72);
    margin-bottom: 40px;
  }
  a {
    display: inline-block;
    font-family: 'Inter', sans-serif; font-size: 10px;
    letter-spacing: 0.42em; text-transform: uppercase;
    padding: 16px 32px;
    color: #d4b87c;
    border: 0.5px solid #b89968;
    text-decoration: none;
    transition: background 220ms ease, color 220ms ease;
  }
  a:hover { background: #b89968; color: #0a0807; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="seal">✦</div>
    <div class="num">Page Four · Hundred · Four</div>
    <h1>A Page Mislaid</h1>
    <p>The chapel's records do not seem to include the page you sought. Forgive us; it may have been moved, or perhaps the link is in error.</p>
    <a href="/">Return to the home page</a>
  </div>
</body>
